<div class="perfil-edit-container">
  <h1>Editar Perfil</h1>
  <p class="subtitulo">
    Mantén privados tus datos personales. Cualquier persona que pueda ver tu
    perfil podrá ver la información que agregues aquí.
  </p>

  <div class="profile-picture">
    <p-avatar
      *ngIf="!profileImg"
      [label]="getInitials(data.nombre)"
      styleClass="mr-2"
      size="xlarge"
      shape="circle"
    >
    </p-avatar>

    <p-avatar
      *ngIf="profileImg"
      [image]="profileImg"
      styleClass="mr-2"
      size="xlarge"
      shape="circle"
    >
    </p-avatar>

    <input type="file" (change)="onFileChange($event)" />
  </div>

  <form class="perfil-form">
    <div class="form-group-container">
      <div class="form-group">
        <label for="primer-nombre">Nombre(s)</label>
        <input type="text" id="primer-nombre" [value]="data.nombre" />
      </div>
      <div class="form-group">
        <label for="email">Correo</label>
        <input type="email" id="email" [value]="data.email" />
      </div>
      <div class="form-group">
        <label for="telefono">Número Telefónico</label>
        <input type="text" id="telefono" [value]="data.telefono" />
      </div>
    </div>
    <div class="button-group">
      <button type="button" (click)="logout()" class="reset-btn">Cerrar Sesión</button>
      <button type="button" class="reset-btn">Restablecer</button>
      <button type="submit" class="save-btn">Guardar</button>
    </div>
  </form>
</div>
